spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:idlegame;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: ${LIQUIBASE_CONTEXTS:local}

app:
  security:
    jwt:
      secret: "replace-with-long-secret-key-at-least-32-bytes-123456"
      expiration-seconds: 86400
  frontend:
    base-url: http://localhost:5173

server:
  port: 8080
